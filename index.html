<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间记录器 - Time Logger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50">
    <div class="min-h-screen flex flex-col">
        <!-- 顶部导航 -->
        <header class="bg-white/70 backdrop-blur-md shadow-sm sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg">
                        <i class="ri-timer-flash-line text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">时间记录器</h1>
                        <p class="text-xs text-gray-500">Time Logger · 一键记录每个重要时刻</p>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-6 text-sm text-gray-600">
                    <div class="flex items-center gap-2">
                        <i class="ri-calendar-line text-indigo-500"></i>
                        <span id="todayDate">--</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="ri-time-line text-purple-500"></i>
                        <span id="liveClock" class="font-mono font-semibold text-gray-800">--:--:--</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左侧：操作面板 -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- 大按钮卡片 -->
                    <div class="bg-white rounded-3xl shadow-xl p-8 text-center relative overflow-hidden">
                        <div class="absolute -top-12 -right-12 w-40 h-40 bg-gradient-to-br from-indigo-200 to-purple-200 rounded-full opacity-50"></div>
                        <div class="absolute -bottom-12 -left-12 w-40 h-40 bg-gradient-to-br from-pink-200 to-purple-200 rounded-full opacity-50"></div>

                        <div class="relative">
                            <p class="text-sm text-gray-500 mb-2">点击下方按钮记录当前时间</p>
                            <h2 class="text-2xl font-bold text-gray-800 mb-6">记录此刻 ⏱️</h2>

                            <button id="recordBtn" class="group relative w-44 h-44 mx-auto rounded-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white font-bold text-xl shadow-2xl hover:shadow-purple-300 transition-all duration-300 hover:scale-105 active:scale-95">
                                <span class="absolute inset-0 rounded-full bg-white/20 opacity-0 group-hover:opacity-100 group-active:opacity-30 transition-opacity"></span>
                                <span class="absolute inset-2 rounded-full border-2 border-white/30"></span>
                                <span class="relative flex flex-col items-center justify-center h-full">
                                    <i class="ri-add-circle-line text-5xl mb-2"></i>
                                    <span>记录时间</span>
                                </span>
                                <span class="ripple-container absolute inset-0 rounded-full overflow-hidden pointer-events-none"></span>
                            </button>

                            <p class="text-xs text-gray-400 mt-6">
                                <i class="ri-keyboard-line"></i> 也可按 <kbd class="px-2 py-0.5 bg-gray-100 rounded text-gray-700 font-mono">空格</kbd> 键记录
                            </p>
                        </div>
                    </div>

                    <!-- 统计卡片 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white rounded-2xl shadow-md p-5">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-gray-500">总记录数</span>
                                <i class="ri-stack-line text-indigo-500"></i>
                            </div>
                            <p class="text-3xl font-bold text-gray-800" id="totalCount">0</p>
                            <p class="text-xs text-gray-400 mt-1">次时间记录</p>
                        </div>
                        <div class="bg-white rounded-2xl shadow-md p-5">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-gray-500">距上次</span>
                                <i class="ri-history-line text-purple-500"></i>
                            </div>
                            <p class="text-3xl font-bold text-gray-800" id="lastInterval">--</p>
                            <p class="text-xs text-gray-400 mt-1" id="lastIntervalUnit">尚无记录</p>
                        </div>
                    </div>

                    <!-- 操作按钮组 -->
                    <div class="bg-white rounded-2xl shadow-md p-5 space-y-3">
                        <h3 class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                            <i class="ri-tools-line text-indigo-500"></i>
                            管理操作
                        </h3>
                        <div class="grid grid-cols-2 gap-3">
                            <button id="exportBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-50 text-emerald-700 rounded-xl hover:bg-emerald-100 transition text-sm font-medium">
                                <i class="ri-download-line"></i> 导出CSV
                            </button>
                            <button id="copyBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-blue-50 text-blue-700 rounded-xl hover:bg-blue-100 transition text-sm font-medium">
                                <i class="ri-file-copy-line"></i> 复制全部
                            </button>
                            <button id="clearBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 bg-red-50 text-red-700 rounded-xl hover:bg-red-100 transition text-sm font-medium col-span-2">
                                <i class="ri-delete-bin-line"></i> 清空记录
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 右侧：记录列表 -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                        <!-- 列表头部 -->
                        <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between bg-gradient-to-r from-indigo-50 to-purple-50">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-white shadow flex items-center justify-center">
                                    <i class="ri-list-check-2 text-indigo-600 text-xl"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold text-gray-800">记录列表</h3>
                                    <p class="text-xs text-gray-500">所有时间记录将自动保存到本地</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="relative">
                                    <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                    <input id="searchInput" type="text" placeholder="搜索备注..." class="pl-9 pr-3 py-2 text-sm bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-400 w-40">
                                </div>
                                <select id="sortSelect" class="px-3 py-2 text-sm bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-indigo-400">
                                    <option value="desc">最新在前</option>
                                    <option value="asc">最早在前</option>
                                </select>
                            </div>
                        </div>

                        <!-- 列表内容 -->
                        <div id="recordList" class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto">
                            <!-- 空状态 -->
                            <div id="emptyState" class="py-20 text-center">
                                <div class="w-24 h-24 mx-auto mb-4 rounded-full bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center">
                                    <i class="ri-inbox-line text-5xl text-indigo-400"></i>
                                </div>
                                <p class="text-gray-500 font-medium">还没有任何记录</p>
                                <p class="text-sm text-gray-400 mt-1">点击左侧大按钮开始记录吧 ✨</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="text-center py-6 text-sm text-gray-500">
            <p>由 <a href="https://with.woa.com/" style="color: #8A2BE2;" target="_blank">With</a> 通过自然语言生成</p>
        </footer>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-800 text-white rounded-full shadow-2xl text-sm opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center gap-2">
        <i class="ri-check-line"></i>
        <span id="toastText">操作成功</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
