<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 外层装饰光晕 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>
  <!-- 时钟主体 -->
  <circle cx="256" cy="256" r="140" fill="url(#ring)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="3"/>
  <!-- 12个刻度 -->
  <g stroke="#6366f1" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="130" x2="256" y2="148"/>
    <line x1="256" y1="364" x2="256" y2="382"/>
    <line x1="130" y1="256" x2="148" y2="256"/>
    <line x1="364" y1="256" x2="382" y2="256"/>
  </g>
  <g stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="319" y1="139" x2="313" y2="151" transform="rotate(0 256 256)"/>
    <line x1="365" y1="184" x2="354" y2="191"/>
    <line x1="365" y1="328" x2="354" y2="321"/>
    <line x1="319" y1="373" x2="313" y2="361"/>
    <line x1="193" y1="373" x2="199" y2="361"/>
    <line x1="147" y1="328" x2="158" y2="321"/>
    <line x1="147" y1="184" x2="158" y2="191"/>
    <line x1="193" y1="139" x2="199" y2="151"/>
  </g>
  <!-- 时针 -->
  <line x1="256" y1="256" x2="256" y2="180" stroke="#6366f1" stroke-width="10" stroke-linecap="round"/>
  <!-- 分针 -->
  <line x1="256" y1="256" x2="332" y2="256" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <!-- 秒针 -->
  <line x1="256" y1="256" x2="200" y2="170" stroke="#ec4899" stroke-width="4" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="12" fill="#ec4899"/>
  <circle cx="256" cy="256" r="5" fill="#ffffff"/>
  <!-- 右下角加号徽章 -->
  <circle cx="380" cy="380" r="46" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="380" cy="380" r="42" fill="url(#bg)"/>
  <line x1="380" y1="362" x2="380" y2="398" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="362" y1="380" x2="398" y2="380" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
</svg>
